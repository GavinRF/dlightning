    <script>
     // Copy the RSS feed URL to the clipboard so visitors can paste it into
     // their feed reader, rather than navigating to the raw XML page.
     function copyRssLink(event, link) {
        event.preventDefault();
        var url = link.getAttribute('href');
        var label = '<i class="fas fa-rss me-1"></i>&nbsp;Copy RSS feed link';
        function showCopied() {
            link.innerHTML = '<i class="fas fa-check me-1"></i>&nbsp;Link copied — paste into your reader';
            setTimeout(function() { link.innerHTML = label; }, 2500);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(showCopied, function() { window.prompt('Copy this feed URL:', url); });
        } else {
            window.prompt('Copy this feed URL:', url);
        }
     }
    </script>

            var $backToTop = $(".back-to-top");

            $(window).on('scroll', function() {
            if ($(this).scrollTop() > 100) {

            } else {
                $backToTop.fadeOut();

            $("html, body").animate({scrollTop: 0}, 500);
            });
    </script>
